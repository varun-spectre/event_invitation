<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
      canvas { display: block; }

      /* Control Panel */
      #controls {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 10;
      }

      button {
        padding: 15px 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid #333;
        border-radius: 8px;
        transition: transform 0.1s;
      }

      button:hover {
        background: #FFD700;
        transform: scale(1.05);
      }

      /* The Invitation Overlay */
      #overlay {
        display: none; /* Hidden by default */
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(0, 0, 0, 0.9); 
        color: white; 
        z-index: 20; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center;
        text-align: center;
      }

      .content-box {
        background: rgba(255,255,255,0.1);
        padding: 40px;
        border-radius: 15px;
        border: 2px solid #FFD700;
        max-width: 500px;
      }

      .fancy-visual-placeholder {
        width: 100%;
        height: 200px;
        background: #333;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaa;
        border: 1px dashed #666;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-D8uOzjHi.js"></script>
  </head>
  <body>
    <div id="controls">
      <button id="btn-haldi">Haldi Ceremony</button>
      <button id="btn-wedding">The Wedding</button>
      <button id="btn-reception">Reception</button>
    </div>

    <div id="overlay">
      <div class="content-box">
        <div class="fancy-visual-placeholder" id="event-visual">
            [ 3D Animation / Image Goes Here ]
        </div>
        
        <h1 id="event-title" style="color: #FFD700;">Event Title</h1>
        <p id="event-details">Details...</p>
        
        <button onclick="document.getElementById('overlay').style.display='none'" style="margin-top: 20px;">Close</button>
      </div>
    </div>

  </body>
</html>
